<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalorien-Tracker - Fotos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
        }

        .upload-box {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .upload-input {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }

        .upload-input:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .status.loading {
            background: #cfe2ff;
            color: #084298;
            display: block;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .photo-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .photo-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .photo-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .photo-info {
            padding: 15px;
            background: #f8f9ff;
        }

        .photo-info p {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .delete-btn {
            background: #dc3545;
            padding: 8px 12px;
            font-size: 0.9em;
            width: 100%;
        }

        .delete-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥗 Kalorien-Tracker</h1>

        <div class="upload-box">
            <h2 style="margin-bottom: 20px;">Foto hochladen</h2>
            <input type="file" id="fileInput" class="upload-input" accept="image/*" placeholder="Klick hier oder zieh ein Foto rein">
            <button onclick="uploadPhoto()">📤 Hochladen</button>
            <div id="status" class="status"></div>
        </div>

        <div id="photosContainer" class="photos-grid"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>

    <script>
        // 🔑 HIER DEINE FIREBASE CONFIG EINTRAGEN:
        const firebaseConfig = {
            apiKey: "AIzaSyD0eo_ebMlfC9SDc9j8-DKwrzF04uQy9ho",
            authDomain: "kalorien-tracker-2421c.firebaseapp.com",
            projectId: "kalorien-tracker-2421c",
            storageBucket: "kalorien-tracker-2421c.firebasestorage.app",
            messagingSenderId: "344939670745",
            appId: "1:344939670745:web:84f98ef642a21e5a8e22c8"
        };

        // Firebase initialisieren
        const app = firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        // Status-Nachricht anzeigen
        function showStatus(message, type = 'loading') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        // Foto hochladen
        async function uploadPhoto() {
            const file = document.getElementById('fileInput').files[0];

            if (!file) {
                showStatus('❌ Bitte wähle ein Foto aus!', 'error');
                return;
            }

            if (!file.type.startsWith('image/')) {
                showStatus('❌ Das muss ein Bild sein!', 'error');
                return;
            }

            showStatus('📤 Lädt hoch...', 'loading');

            try {
                const fileName = `fotos/${Date.now()}_${file.name}`;
                const storageRef = storage.ref(fileName);
                await storageRef.put(file);

                showStatus('✅ Foto erfolgreich hochgeladen!', 'success');
                document.getElementById('fileInput').value = '';

                // Galerie aktualisieren
                loadPhotos();
            } catch (error) {
                console.error('Upload-Fehler:', error);
                showStatus(`❌ Fehler: ${error.message}`, 'error');
            }
        }

        // Alle Fotos laden und anzeigen
        async function loadPhotos() {
            try {
                const storageRef = storage.ref('fotos');
                const result = await storageRef.listAll();
                const container = document.getElementById('photosContainer');
                container.innerHTML = '';

                for (const item of result.items) {
                    const url = await item.getDownloadURL();
                    const metadata = await item.getMetadata();
                    const date = new Date(metadata.timeCreated).toLocaleDateString('de-DE');

                    const photoHTML = `
                        <div class="photo-item">
                            <img src="${url}" alt="Foto">
                            <div class="photo-info">
                                <p>${date}</p>
                                <button class="delete-btn" onclick="deletePhoto('${item.name}')">🗑️ Löschen</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += photoHTML;
                }
            } catch (error) {
                console.error('Fehler beim Laden:', error);
            }
        }

        // Foto löschen
        async function deletePhoto(fileName) {
            if (!confirm('Foto wirklich löschen?')) return;

            try {
                await storage.ref(`fotos/${fileName}`).delete();
                loadPhotos();
            } catch (error) {
                console.error('Lösch-Fehler:', error);
                alert('Fehler beim Löschen!');
            }
        }

        // Beim Laden: Fotos anzeigen
        loadPhotos();
    </script>
</body>
</html>
